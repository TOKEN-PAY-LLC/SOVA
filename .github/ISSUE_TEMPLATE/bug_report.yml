name: Bug Report
description: Report a bug or issue with SOVA Protocol
labels: "bug"
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Clear description of the bug
      placeholder: "What happened?"
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior
      placeholder: |
        1. Run command `...`
        2. Connect to `...`
        3. See error

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error Logs
      description: Relevant error logs or stack trace
      render: bash

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: System information
      value: |
        - OS: [e.g. Windows 11, Ubuntu 22.04, macOS 13]
        - Architecture: [e.g. amd64, arm64]
        - SOVA Version: [e.g. v1.0.1]
        - Go Version: [e.g. 1.21]
      render: markdown

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Any other relevant information
