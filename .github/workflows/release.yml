name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod download

      - name: Run tests
        run: go test -v -count=1 -timeout 120s ./common/

  build:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install dependencies
        run: go mod download

      - name: Build binaries
        run: |
          mkdir -p dist
          VERSION=${{ github.ref_name }}
          LDFLAGS="-s -w -X main.Version=${VERSION}"
          # Linux
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-linux-amd64 ./server
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-linux-amd64 ./client
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-linux-arm64 ./server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-linux-arm64 ./client
          # Windows
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-windows-amd64.exe ./server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-windows-amd64.exe ./client
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-windows-arm64.exe ./server
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-windows-arm64.exe ./client
          # macOS
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-macos-amd64 ./server
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-macos-amd64 ./client
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-server-macos-arm64 ./server
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "$LDFLAGS" -o dist/sova-macos-arm64 ./client

      - name: Create archives
        run: |
          cd dist
          VERSION=${{ github.ref_name }}
          tar -czf sova-linux-amd64-${VERSION}.tar.gz sova-server-linux-amd64 sova-linux-amd64
          tar -czf sova-linux-arm64-${VERSION}.tar.gz sova-server-linux-arm64 sova-linux-arm64
          tar -czf sova-macos-amd64-${VERSION}.tar.gz sova-server-macos-amd64 sova-macos-amd64
          tar -czf sova-macos-arm64-${VERSION}.tar.gz sova-server-macos-arm64 sova-macos-arm64
          zip -q sova-windows-amd64-${VERSION}.zip sova-server-windows-amd64.exe sova-windows-amd64.exe
          zip -q sova-windows-arm64-${VERSION}.zip sova-server-windows-arm64.exe sova-windows-arm64.exe
          cp ../install.sh .
          cp ../install.ps1 .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: SOVA Protocol ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/sova-linux-amd64-${{ github.ref_name }}.tar.gz
            dist/sova-linux-arm64-${{ github.ref_name }}.tar.gz
            dist/sova-macos-amd64-${{ github.ref_name }}.tar.gz
            dist/sova-macos-arm64-${{ github.ref_name }}.tar.gz
            dist/sova-windows-amd64-${{ github.ref_name }}.zip
            dist/sova-windows-arm64-${{ github.ref_name }}.zip
            dist/install.sh
            dist/install.ps1
