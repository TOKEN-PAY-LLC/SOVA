name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run tests
        run: go test -v -race ./...
      
      - name: Build binaries
        run: |
          mkdir -p dist
          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-server-linux-amd64 ./server
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-linux-amd64 ./client
          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-server-linux-arm64 ./server
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-linux-arm64 ./client
          # Windows AMD64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-server-windows-amd64.exe ./server
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-windows-amd64.exe ./client
          # Windows ARM64
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-server-windows-arm64.exe ./server
          GOOS=windows GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-windows-arm64.exe ./client
          # macOS AMD64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-server-macos-amd64 ./server
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -o dist/sova-macos-amd64 ./client
          # macOS ARM64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-server-macos-arm64 ./server
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -o dist/sova-macos-arm64 ./client
      
      - name: Create archives
        run: |
          cd dist
          tar -czf sova-linux-amd64-${{ github.ref_name }}.tar.gz sova-server-linux-amd64 sova-linux-amd64
          tar -czf sova-linux-arm64-${{ github.ref_name }}.tar.gz sova-server-linux-arm64 sova-linux-arm64
          tar -czf sova-macos-amd64-${{ github.ref_name }}.tar.gz sova-server-macos-amd64 sova-macos-amd64
          tar -czf sova-macos-arm64-${{ github.ref_name }}.tar.gz sova-server-macos-arm64 sova-macos-arm64
          zip -q sova-windows-amd64-${{ github.ref_name }}.zip sova-server-windows-amd64.exe sova-windows-amd64.exe
          zip -q sova-windows-arm64-${{ github.ref_name }}.zip sova-server-windows-arm64.exe sova-windows-arm64.exe
      
      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
      
      - name: Upload Release Assets
        uses: actions/upload-artifact@v3
        with:
          name: sova-binaries
          path: dist/sova-*-${{ github.ref_name }}.tar.gz
          path: dist/sova-*-${{ github.ref_name }}.zip

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'
      
      - name: Install dependencies
        run: go mod download
      
      - name: Run unit tests
        run: go test -v -coverprofile=coverage.out ./...
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.out
